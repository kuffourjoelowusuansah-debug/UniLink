<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniLink | Data Connectivity Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #dcd9e8; /* The lavender background from the UI */
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(255,255,255,0.4) 0%, transparent 20%),
                radial-gradient(circle at 80% 80%, rgba(142, 141, 162, 0.2) 0%, transparent 20%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Glassmorphism Effect */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            border-radius: 28px;
        }

        .dark-card {
            background: #2d2c44;
            color: white;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        /* The Orange Accent */
        .accent-amber { background-color: #ff9f43; }
        
        /* Connecting Lines Simulation */
        .connector-line {
            position: absolute;
            border: 1.5px solid rgba(255,255,255,0.5);
            z-index: -1;
        }

        .node-square {
            width: 14px;
            height: 14px;
            background: #ff9f43;
            border: 3px solid white;
            border-radius: 4px;
            position: absolute;
        }
    </style>
</head>
<body class="p-8 flex items-center justify-center">

    <!-- Decorative Nodes & Lines -->
    <div class="node-square" style="top: 15%; right: 10%;"></div>
    <div class="node-square" style="bottom: 10%; left: 30%;"></div>

    <!-- Main Dashboard Grid -->
    <div class="grid grid-cols-12 gap-8 w-full max-w-7xl relative">
        
        <!-- LEFT COLUMN: Mobile Preview & Profile -->
        <div class="col-span-3 space-y-6">
            <!-- Mobile Component -->
            <div class="dark-card p-6 h-[400px] relative overflow-hidden">
                <div class="accent-amber w-12 h-2 rounded-full mb-6"></div>
                <div class="space-y-3">
                    <div class="h-2 w-3/4 bg-white/10 rounded"></div>
                    <div class="h-2 w-1/2 bg-white/10 rounded"></div>
                </div>
                <div class="absolute bottom-8 left-6 right-6 h-32 bg-white/5 rounded-2xl border border-white/10 p-4">
                    <div class="flex gap-2">
                         <div class="w-8 h-8 rounded bg-accent-amber"></div>
                         <div class="space-y-2 flex-1">
                            <div class="h-2 w-full bg-white/20 rounded"></div>
                            <div class="h-2 w-2/3 bg-white/20 rounded"></div>
                         </div>
                    </div>
                </div>
            </div>

            <!-- Profile Widget -->
            <div class="glass-card p-6 h-[200px] flex flex-col justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-gray-200 rounded-xl"></div>
                    <div class="space-y-2">
                        <div class="h-3 w-24 bg-gray-300 rounded"></div>
                        <div class="h-2 w-16 bg-gray-200 rounded"></div>
                    </div>
                </div>
                <div class="h-2 w-full bg-gray-100 rounded"></div>
            </div>
        </div>

        <!-- CENTER COLUMN: Main Analytics (Tablet View) -->
        <div class="col-span-5">
            <div class="dark-card h-[630px] overflow-hidden flex flex-col">
                <!-- Dark Section: Chart -->
                <div class="p-8 flex-1 bg-[#232238]">
                    <div class="flex justify-between items-center mb-12">
                        <div class="flex gap-2">
                            <div class="w-10 h-10 rounded-lg bg-white/5 border border-white/10"></div>
                            <div class="w-10 h-10 rounded-lg bg-white/5 border border-white/10"></div>
                        </div>
                        <div class="accent-amber px-6 py-2 rounded-xl text-xs font-bold uppercase tracking-wider">Live</div>
                    </div>
                    
                    <!-- Waveform SVG -->
                    <svg viewBox="0 0 400 100" class="w-full mt-10">
                        <path d="M0,50 Q50,0 100,50 T200,50 T300,50 T400,20" fill="none" stroke="#ff9f43" stroke-width="3" />
                        <circle cx="100" cy="50" r="4" fill="white" />
                        <circle cx="200" cy="50" r="4" fill="white" />
                        <circle cx="300" cy="50" r="4" fill="white" />
                    </svg>
                </div>
                
                <!-- Light Section: Cards -->
                <div class="bg-white p-8 h-2/5 grid grid-cols-2 gap-4">
                    <div class="border border-gray-100 rounded-2xl p-4 shadow-sm">
                        <div class="accent-amber w-8 h-1 rounded mb-4"></div>
                        <div class="space-y-2">
                            <div class="h-2 bg-gray-100 rounded w-full"></div>
                            <div class="h-2 bg-gray-100 rounded w-5/6"></div>
                        </div>
                    </div>
                    <div class="border border-gray-100 rounded-2xl p-4 shadow-sm">
                        <div class="accent-amber w-8 h-1 rounded mb-4"></div>
                        <div class="space-y-2">
                            <div class="h-2 bg-gray-100 rounded w-full"></div>
                            <div class="h-2 bg-gray-100 rounded w-5/6"></div>
                        </div>
                    </div>
                    <div class="col-span-2 flex justify-center mt-2">
                        <div class="w-12 h-1 bg-gray-200 rounded-full"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- RIGHT COLUMN: Tasks & Control -->
        <div class="col-span-4 space-y-6">
            <!-- Checklist Card -->
            <div class="glass-card p-8 h-[380px]">
                <div class="flex justify-between mb-8">
                    <div class="h-4 w-32 bg-gray-800 rounded"></div>
                    <div class="w-8 h-8 dark-card rounded-lg"></div>
                </div>
                <div class="space-y-6">
                    <div class="flex items-center gap-4">
                        <div class="w-5 h-5 border-2 border-gray-200 rounded"></div>
                        <div class="h-2 flex-1 bg-gray-100 rounded"></div>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="w-5 h-5 border-2 border-gray-200 rounded"></div>
                        <div class="h-2 flex-1 bg-gray-100 rounded"></div>
                    </div>
                    <div class="p-4 border-2 border-dashed border-gray-200 rounded-2xl h-24"></div>
                </div>
            </div>

            <!-- Mini Graph Card -->
            <div class="dark-card p-6 h-[225px] flex flex-col justify-between">
                <div class="flex justify-between">
                    <div class="space-y-2">
                        <div class="h-2 w-20 bg-white/20 rounded"></div>
                        <div class="h-4 w-32 bg-white rounded"></div>
                    </div>
                    <div class="w-10 h-10 rounded-full border-2 border-accent-amber p-1">
                        <div class="w-full h-full bg-accent-amber rounded-full"></div>
                    </div>
                </div>
                <div class="h-12 w-full bg-white/5 rounded-xl flex items-end p-2 gap-1">
                    <div class="flex-1 bg-white/20 rounded-t h-4"></div>
                    <div class="flex-1 bg-accent-amber rounded-t h-8"></div>
                    <div class="flex-1 bg-white/20 rounded-t h-6"></div>
                    <div class="flex-1 bg-white/20 rounded-t h-10"></div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
