<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | Purple & Orange Theme</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Color Palette derived from the image */
    --bg-app: #E4E2F1;
    --surface-dark: #32304C;
    --surface-darker: #26243D;
    --surface-light: #F4F3F8;
    --surface-white: #FFFFFF;
    
    --accent-orange: #FF9431;
    --accent-yellow: #FFC259;
    
    --text-main: #FFFFFF;
    --text-muted: #8E8BBA;
    --text-dark: #32304C;
    --text-dark-muted: #79769B;
    
    --border-radius-lg: 24px;
    --border-radius-md: 16px;
    --border-radius-sm: 8px;
    
    --shadow-soft: 0 10px 30px rgba(38, 36, 61, 0.1);
    --shadow-floating: 0 20px 40px rgba(38, 36, 61, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background-color: var(--bg-app);
    color: var(--text-dark);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 2rem;
  }

  /* MAIN APP CONTAINER */
  .app-container {
    width: 100%;
    max-width: 1200px;
    display: grid;
    grid-template-columns: 280px 1fr 300px;
    gap: 2rem;
  }

  /* SIDEBAR (Left Panel) */
  .sidebar {
    background: var(--surface-light);
    border-radius: var(--border-radius-lg);
    padding: 2rem;
    display: flex;
    flex-direction: column;
    gap: 2rem;
    box-shadow: var(--shadow-soft);
  }

  .logo-block {
    width: 48px;
    height: 48px;
    background: var(--surface-dark);
    border-radius: var(--border-radius-md);
    position: relative;
  }
  .logo-block::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 20px; height: 20px;
    background: var(--accent-orange);
    border-radius: 4px;
  }

  .nav-menu {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    flex-grow: 1;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem;
    border-radius: var(--border-radius-md);
    cursor: pointer;
    transition: all 0.3s ease;
  }
  
  .nav-item.active {
    background: var(--surface-dark);
    color: var(--text-main);
  }
  
  .nav-item:not(.active):hover {
    background: rgba(50, 48, 76, 0.05);
  }

  .nav-icon {
    width: 20px;
    height: 6px;
    background: var(--accent-orange);
    border-radius: 10px;
  }
  .nav-item:not(.active) .nav-icon { background: var(--text-muted); }

  .nav-line {
    width: 60px;
    height: 6px;
    background: var(--text-muted);
    border-radius: 10px;
    opacity: 0.5;
  }
  .nav-item.active .nav-line { background: var(--surface-white); opacity: 1; }

  /* MAIN DASHBOARD (Center Panel) */
  .main-dashboard {
    background: var(--surface-dark);
    border-radius: 32px;
    padding: 2.5rem;
    display: flex;
    flex-direction: column;
    gap: 2rem;
    box-shadow: var(--shadow-floating);
    position: relative;
    overflow: hidden;
  }

  .dashboard-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .search-bar {
    width: 120px;
    height: 12px;
    background: var(--surface-white);
    border-radius: 10px;
    opacity: 0.8;
  }

  .header-action {
    width: 80px;
    height: 24px;
    background: var(--accent-orange);
    border-radius: 12px;
  }

  /* CHART AREA */
  .chart-container {
    height: 200px;
    background: var(--surface-darker);
    border-radius: var(--border-radius-lg);
    position: relative;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  .chart-svg {
    position: absolute;
    bottom: 2rem;
    left: 0;
    width: 100%;
    height: 60%;
  }

  .chart-points {
    position: absolute;
    bottom: 3.5rem;
    left: 20%;
    width: 12px; height: 12px;
    background: var(--accent-yellow);
    border-radius: 50%;
    box-shadow: 0 0 0 4px rgba(255, 194, 89, 0.3);
  }
  .chart-points:nth-child(2) { left: 45%; bottom: 6rem; background: var(--surface-white); box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.2); }
  .chart-points:nth-child(3) { left: 75%; bottom: 4.5rem; }

  .chart-axis {
    display: flex;
    justify-content: space-between;
    border-top: 2px dashed rgba(142, 139, 186, 0.3);
    padding-top: 1rem;
    margin-top: 2rem;
  }

  .axis-dot {
    width: 8px; height: 8px;
    background: var(--text-muted);
    border-radius: 50%;
  }

  /* BOTTOM CARDS GRID */
  .cards-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
  }

  .data-card {
    background: var(--surface-white);
    border-radius: var(--border-radius-lg);
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .card-header {
    width: 60%;
    height: 10px;
    background: var(--text-dark-muted);
    border-radius: 10px;
    opacity: 0.3;
    margin-bottom: 0.5rem;
  }

  .list-item {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding-bottom: 0.8rem;
    border-bottom: 1px solid rgba(0,0,0,0.05);
  }
  .list-item:last-child { border: none; padding-bottom: 0; }

  .checkbox {
    width: 24px; height: 24px;
    border: 2px solid var(--text-muted);
    border-radius: 6px;
    opacity: 0.5;
  }
  .checkbox.checked {
    background: var(--surface-dark);
    border-color: var(--surface-dark);
  }

  .list-lines {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex-grow: 1;
  }
  .line-long { height: 6px; background: var(--text-dark); border-radius: 4px; width: 80%; }
  .line-short { height: 6px; background: var(--text-muted); border-radius: 4px; width: 40%; opacity: 0.5; }

  /* RIGHT PANEL (Analytics Widget) */
  .right-panel {
    display: flex;
    flex-direction: column;
    gap: 2rem;
  }

  .analytics-widget {
    background: var(--surface-dark);
    border-radius: var(--border-radius-lg);
    padding: 2rem;
    box-shadow: var(--shadow-floating);
  }

  .widget-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 2rem;
  }
  
  .pie-chart {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: conic-gradient(var(--accent-orange) 0% 40%, var(--surface-white) 40% 75%, var(--text-muted) 75% 100%);
  }

  .bar-chart {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    height: 60px;
  }
  .bar { width: 12px; background: var(--accent-orange); border-radius: 4px 4px 0 0; }
  .bar:nth-child(2) { height: 40%; background: var(--surface-white); }
  .bar:nth-child(3) { height: 80%; background: var(--text-muted); }
  .bar:nth-child(4) { height: 100%; }

  .secondary-widget {
    background: var(--surface-darker);
    border-radius: var(--border-radius-lg);
    padding: 1.5rem;
    flex-grow: 1;
  }

  /* Responsive Design */
  @media (max-width: 1024px) {
    .app-container { grid-template-columns: 80px 1fr; }
    .nav-line { display: none; }
    .nav-item { justify-content: center; }
    .right-panel { display: none; }
  }

  @media (max-width: 768px) {
    .app-container { grid-template-columns: 1fr; }
    .sidebar { flex-direction: row; justify-content: center; padding: 1rem; }
    .nav-menu { flex-direction: row; justify-content: center; }
    .cards-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="app-container">
  
  <!-- LEFT SIDEBAR -->
  <aside class="sidebar">
    <div class="logo-block"></div>
    <div class="nav-menu">
      <div class="nav-item active">
        <div class="nav-icon"></div>
        <div class="nav-line"></div>
      </div>
      <div class="nav-item">
        <div class="nav-icon"></div>
        <div class="nav-line"></div>
      </div>
      <div class="nav-item">
        <div class="nav-icon"></div>
        <div class="nav-line"></div>
      </div>
      <div class="nav-item">
        <div class="nav-icon"></div>
        <div class="nav-line"></div>
      </div>
    </div>
  </aside>

  <!-- MAIN DASHBOARD -->
  <main class="main-dashboard">
    <div class="dashboard-header">
      <div class="search-bar"></div>
      <div style="display: flex; gap: 10px;">
        <div class="search-bar" style="width: 40px; border-radius: 20px;"></div>
        <div class="header-action"></div>
      </div>
    </div>

    <!-- Big Chart Area -->
    <div class="chart-container">
      <!-- Decorative SVG Wave Chart -->
      <svg class="chart-svg" preserveAspectRatio="none" viewBox="0 0 100 100">
        <path d="M0,80 Q10,20 30,50 T70,30 T100,60 L100,100 L0,100 Z" fill="rgba(255, 148, 49, 0.1)" stroke="var(--accent-orange)" stroke-width="2"/>
      </svg>
      <div class="chart-points"></div>
      <div class="chart-points"></div>
      <div class="chart-points"></div>

      <div class="chart-axis">
        <div class="axis-dot"></div><div class="axis-dot"></div>
        <div class="axis-dot"></div><div class="axis-dot"></div>
        <div class="axis-dot"></div><div class="axis-dot"></div>
        <div class="axis-dot"></div><div class="axis-dot"></div>
      </div>
    </div>

    <div style="display: flex; justify-content: center; gap: 10px; margin-top: -10px;">
        <div class="axis-dot" style="background: var(--surface-white); width: 24px; border-radius: 12px;"></div>
        <div class="axis-dot"></div>
        <div class="axis-dot"></div>
    </div>

    <!-- Bottom Light Cards -->
    <div class="cards-grid">
      <!-- Card 1 -->
      <div class="data-card">
        <div class="card-header"></div>
        <div class="list-item">
          <div class="checkbox"></div>
          <div class="list-lines">
            <div class="line-long"></div><div class="line-short"></div>
          </div>
        </div>
        <div class="list-item">
          <div class="checkbox checked"></div>
          <div class="list-lines">
            <div class="line-long"></div><div class="line-short"></div>
          </div>
        </div>
      </div>

      <!-- Card 2 -->
      <div class="data-card">
        <div class="card-header"></div>
        <div class="list-item">
          <div class="checkbox checked"></div>
          <div class="list-lines">
            <div class="line-long"></div><div class="line-short"></div>
          </div>
        </div>
        <div class="list-item">
          <div class="checkbox"></div>
          <div class="list-lines">
            <div class="line-long"></div><div class="line-short"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- RIGHT PANEL -->
  <aside class="right-panel">
    <!-- Top Analytics Widget -->
    <div class="analytics-widget">
      <div class="widget-header">
        <div class="pie-chart"></div>
        <div class="bar-chart">
          <div class="bar" style="height: 60%;"></div>
          <div class="bar" style="height: 80%;"></div>
          <div class="bar" style="height: 40%;"></div>
          <div class="bar" style="height: 100%;"></div>
        </div>
      </div>
      <div class="list-lines" style="margin-top: 20px;">
        <div class="line-long" style="background: var(--surface-white); width: 100%;"></div>
        <div class="line-short" style="background: var(--text-muted); width: 60%;"></div>
      </div>
    </div>

    <!-- Bottom Secondary Widget -->
    <div class="secondary-widget">
       <div class="list-lines" style="gap: 12px;">
         <div class="line-long" style="background: var(--text-muted); width: 40%;"></div>
         <div class="line-long" style="background: var(--surface-white); width: 90%; height: 8px;"></div>
         <div class="line-long" style="background: var(--surface-white); width: 70%; height: 8px;"></div>
       </div>
       
       <div style="margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; display: flex; align-items: center; gap: 15px;">
         <div style="width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--accent-orange); display: flex; justify-content: center; align-items: center;">
            <div style="width: 30px; height: 30px; border-radius: 50%; background: var(--surface-dark);"></div>
         </div>
         <div class="list-lines">
            <div class="line-long" style="background: var(--surface-white);"></div>
            <div class="line-short" style="background: var(--accent-orange);"></div>
         </div>
       </div>
    </div>
  </aside>

</div>

</body>
</html>
