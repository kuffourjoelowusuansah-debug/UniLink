<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniLink GH | Ultimate Dribbble Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-lavender: #E6E4F0;
            --grad-dark-card: linear-gradient(180deg, #4A466A 0%, #2A2740 100%);
            --grad-dark-inner: linear-gradient(180deg, #56517A 0%, #3B3754 100%);
            --grad-orange: linear-gradient(90deg, #FFB85C 0%, #FF8D36 100%);
            --white: #FFFFFF;
            --text-dark: #2A2740;
            --text-muted: #9592B6;
            --line-grey: #E0DFEC;
            --shadow-soft: 0 15px 35px rgba(42, 39, 64, 0.08);
            --shadow-float: 0 25px 50px rgba(42, 39, 64, 0.2);
            --shadow-orange: 0 10px 20px rgba(255, 141, 54, 0.3);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background-color: var(--bg-lavender); 
            color: var(--text-dark); 
            overflow-x: hidden; 
            min-height: 100vh;
        }

        /* The exact connecting lines and nodes background */
        .bg-nodes {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
            background-image: 
                radial-gradient(circle at 15% 50px, var(--white) 3px, transparent 4px),
                radial-gradient(circle at 85% 30px, var(--white) 3px, transparent 4px),
                radial-gradient(circle at 10% 80%, var(--white) 4px, transparent 5px),
                radial-gradient(circle at 90% 70%, var(--white) 4px, transparent 5px);
        }
        .bg-line {
            position: fixed; border: 1.5px solid var(--white); border-radius: 20px; z-index: -1;
            opacity: 0.7;
        }
        .floating-cube {
            position: fixed; width: 24px; height: 24px; border-radius: 6px; 
            background: var(--grad-orange); box-shadow: var(--shadow-orange); z-index: -1;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        /* Navigation */
        nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--grad-dark-card); padding: 15px 35px; border-radius: 40px;
            display: flex; gap: 30px; z-index: 1000; box-shadow: var(--shadow-float);
        }
        nav a { color: var(--text-muted); text-decoration: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: var(--transition); letter-spacing: 1px; }
        nav a.active { color: #FFB85C; }

        .page { display: none; min-height: 100vh; width: 100%; padding: 60px 20px 120px; animation: fadeIn 0.5s ease forwards; justify-content: center; align-items: center; }
        .page.active { display: flex; flex-direction: column; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

        /* Shared Components */
        .btn-grad {
            background: var(--grad-orange); color: var(--white); padding: 16px 32px; 
            border-radius: 25px; border: none; font-weight: 800; cursor: pointer; 
            transition: var(--transition); box-shadow: var(--shadow-orange);
            display: inline-flex; justify-content: center; align-items: center;
        }
        .btn-grad:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 15px 25px rgba(255, 141, 54, 0.4); }
        
        .pill-line { height: 6px; background: var(--line-grey); border-radius: 10px; margin: 8px 0; }
        .pill-dark { background: var(--grad-dark-inner); }
        .pill-orange { background: var(--grad-orange); }

        /* --- DASHBOARD (Matches Center Screen) --- */
        .dash-container {
            width: 100%; max-width: 600px; border-radius: 35px;
            background: var(--white); box-shadow: var(--shadow-float);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .dash-top {
            background: var(--grad-dark-card); padding: 40px; color: var(--white);
            position: relative; border-bottom-left-radius: 35px; border-bottom-right-radius: 35px;
            z-index: 2; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .dash-top-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .dash-pill { width: 60px; height: 12px; border-radius: 10px; background: var(--white); opacity: 0.2; }
        
        /* Mock Wavy Chart */
        .mock-chart { width: 100%; height: 120px; position: relative; margin-top: 20px; }
        .chart-svg { width: 100%; height: 100%; overflow: visible; }
        .chart-path { fill: none; stroke: #FFB85C; stroke-width: 3; stroke-linecap: round; }
        .chart-dot { fill: var(--white); opacity: 0.2; }
        
        .dash-bottom { padding: 40px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; background: var(--white); margin-top: -20px; padding-top: 50px; }
        .net-card {
            background: var(--white); border-radius: 20px; padding: 25px;
            box-shadow: var(--shadow-soft); cursor: pointer; transition: var(--transition);
            border: 2px solid var(--bg-lavender); position: relative;
        }
        .net-card:hover { transform: translateY(-5px); border-color: #FFB85C; box-shadow: var(--shadow-float); }
        .net-icon { width: 30px; height: 30px; border-radius: 8px; background: var(--grad-dark-inner); margin-bottom: 15px; }
        
        /* --- BUNDLES (Matches Top Left Screen) --- */
        .bundles-card {
            width: 100%; max-width: 400px; background: var(--grad-dark-card);
            border-radius: 35px; padding: 40px; box-shadow: var(--shadow-float);
            position: relative;
        }
        .b-inner-dark { background: var(--grad-dark-inner); padding: 25px; border-radius: 20px; margin-bottom: 30px; }
        .b-white-card {
            background: var(--white); padding: 30px; border-radius: 25px;
            box-shadow: var(--shadow-float); margin-bottom: 15px; color: var(--text-dark);
            position: relative;
        }
        
        /* --- CHECKOUT (Matches Top Right Screen) --- */
        .checkout-wrapper { position: relative; width: 100%; max-width: 600px; display: flex; align-items: center; justify-content: center;}
        .checkout-main {
            background: var(--white); width: 100%; padding: 50px; border-radius: 35px;
            box-shadow: var(--shadow-float);
        }
        /* The overlapping dark widget from the image */
        .checkout-widget {
            position: absolute; right: -40px; top: 80px; width: 160px;
            background: var(--grad-dark-card); padding: 25px; border-radius: 25px;
            box-shadow: var(--shadow-float); z-index: 10;
        }
        .widget-box { width: 100%; height: 60px; border: 2px solid #FFB85C; border-radius: 12px; margin-bottom: 15px; display: flex; align-items:center; justify-content: center; color: #FFB85C; font-weight: bold;}
        .form-row { display: flex; gap: 15px; margin-bottom: 25px; align-items: center; }
        .checkbox-mock { width: 20px; height: 20px; border-radius: 6px; border: 2px solid var(--text-muted); }
        input { width: 100%; padding: 18px; background: var(--bg-lavender); border: none; border-radius: 15px; font-weight: 600; color: var(--text-dark); margin-bottom: 15px; }
        input:focus { outline: 2px solid #FFB85C; }

        /* --- SETTINGS (Matches Bottom Left Screen) --- */
        .settings-card {
            width: 100%; max-width: 700px; display: flex; background: var(--white);
            border-radius: 35px; box-shadow: var(--shadow-float); overflow: hidden;
            padding: 10px; gap: 10px;
        }
        .set-dark { background: var(--grad-dark-card); flex: 1; border-radius: 25px; padding: 40px; color: var(--white); display: flex; flex-direction: column; align-items: center; }
        .set-white { flex: 1.5; background: var(--white); border-radius: 25px; padding: 40px; }
        .set-avatar { width: 80px; height: 80px; background: var(--grad-dark-inner); border-radius: 20px; margin-bottom: 30px; border: 2px solid rgba(255,255,255,0.1); }
        
        .list-item { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .list-icon { width: 40px; height: 40px; border-radius: 12px; background: var(--bg-lavender); }

        @media (max-width: 768px) {
            .dash-bottom { grid-template-columns: 1fr; }
            .checkout-widget { position: relative; right: auto; top: auto; width: 100%; margin-top: 20px; }
            .settings-card { flex-direction: column; }
            nav { width: 90%; justify-content: space-around; padding: 15px 10px; }
        }
    </style>
</head>
<body>

    <!-- Background Elements mapping to the image -->
    <div class="bg-nodes"></div>
    <div class="bg-line" style="top: 10%; left: 10%; width: 200px; height: 100px; border-bottom: none; border-right: none;"></div>
    <div class="bg-line" style="top: 50%; right: 5%; width: 150px; height: 300px; border-top: none; border-left: none;"></div>
    <div class="bg-line" style="bottom: 10%; left: 15%; width: 300px; height: 50px; border-top: none; border-right: none;"></div>
    
    <div class="floating-cube" style="top: 15%; left: 25%;"></div>
    <div class="floating-cube" style="bottom: 25%; right: 10%; width: 30px; height: 30px;"></div>
    <div class="floating-cube" style="bottom: 15%; left: 45%; width: 20px; height: 20px;"></div>

    <nav id="navbar">
        <a onclick="showPage('dashboard')" id="nav-dashboard" class="active">DASHBOARD</a>
        <a onclick="showPage('bundles')" id="nav-bundles">BUNDLES</a>
        <a onclick="showPage('checkout')" id="nav-checkout">CHECKOUT</a>
        <a onclick="showPage('settings')" id="nav-settings">SETTINGS</a>
    </nav>

    <!-- DASHBOARD PAGE (Center Image Match) -->
    <section id="dashboard" class="page active">
        <div class="dash-container">
            <div class="dash-top">
                <div class="dash-top-header">
                    <div class="dash-pill" style="width: 40px;"></div>
                    <div class="dash-pill" style="background: #FFB85C; opacity: 1;"></div>
                </div>
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <div class="dash-pill" style="width: 80px;"></div>
                    <div class="dash-pill" style="width: 40px;"></div>
                </div>
                <h2 style="font-size: 2.5rem; margin: 10px 0;">Rank #90</h2>
                
                <!-- Glowing SVG Chart matching image -->
                <div class="mock-chart">
                    <svg class="chart-svg" viewBox="0 0 500 100">
                        <path class="chart-path" d="M0,80 Q50,20 100,60 T200,40 T300,70 T400,20 T500,80" />
                        <circle cx="100" cy="60" r="15" class="chart-dot"/>
                        <circle cx="200" cy="40" r="25" class="chart-dot"/>
                        <circle cx="300" cy="70" r="10" class="chart-dot"/>
                        <circle cx="400" cy="20" r="20" class="chart-dot"/>
                        <!-- Bottom baseline -->
                        <line x1="0" y1="95" x2="500" y2="95" stroke="rgba(255,255,255,0.2)" stroke-width="2" />
                        <circle cx="50" cy="95" r="3" fill="#fff" />
                        <circle cx="150" cy="95" r="3" fill="#fff" />
                        <circle cx="250" cy="95" r="3" fill="#fff" />
                        <circle cx="350" cy="95" r="3" fill="#fff" />
                        <circle cx="450" cy="95" r="3" fill="#fff" />
                    </svg>
                </div>
            </div>
            
            <div class="dash-bottom">
                <div class="net-card" onclick="openBundles('MTN')">
                    <div class="net-icon"></div>
                    <div class="pill-line" style="width: 60%; background: var(--text-dark);"></div>
                    <div class="pill-line" style="width: 40%;"></div>
                    <h3 style="margin-top: 10px; font-weight: 800;">MTN</h3>
                </div>
                <div class="net-card" onclick="openBundles('TELECEL')">
                    <div class="net-icon" style="background: var(--line-grey);"></div>
                    <div class="pill-line" style="width: 70%; background: var(--text-dark);"></div>
                    <div class="pill-line" style="width: 30%;"></div>
                    <h3 style="margin-top: 10px; font-weight: 800;">Telecel</h3>
                </div>
                <div class="net-card" onclick="openBundles('AT')" style="grid-column: span 2; display: flex; align-items: center; gap: 20px;">
                    <div class="net-icon" style="margin: 0; background: var(--line-grey);"></div>
                    <div style="flex: 1;">
                        <h3 style="font-weight: 800;">AT Network</h3>
                        <div class="pill-line" style="width: 40%;"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- BUNDLES PAGE (Top Left Image Match) -->
    <section id="bundles" class="page">
        <div class="bundles-card">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <div class="dash-pill" style="width: 30px;"></div>
                <div class="dash-pill" style="width: 30px;"></div>
            </div>
            
            <div class="b-inner-dark">
                <div class="pill-line pill-orange" style="width: 40%;"></div>
                <div class="pill-line pill-dark" style="width: 80%; background: rgba(255,255,255,0.2);"></div>
                <div class="pill-line pill-dark" style="width: 60%; background: rgba(255,255,255,0.2);"></div>
            </div>

            <h2 id="selected-network" style="color: white; margin-bottom: 20px;">MTN Bundles</h2>

            <div id="bundle-list">
                <!-- Javascript populated -->
            </div>
        </div>
    </section>

    <!-- CHECKOUT PAGE (Top Right Image Match) -->
    <section id="checkout" class="page">
        <div class="checkout-wrapper">
            <div class="checkout-main">
                <div style="display: flex; gap: 20px; margin-bottom: 40px;">
                    <div class="net-icon" style="background: var(--text-dark);"></div>
                    <div>
                        <div class="pill-line" style="width: 100px; background: var(--text-dark);"></div>
                        <div class="pill-line" style="width: 60px;"></div>
                    </div>
                </div>
                
                <div class="pill-line pill-orange" style="width: 100%; height: 8px; margin-bottom: 30px;"></div>
                
                <h2 style="margin-bottom: 20px;">Enter Details</h2>
                
                <div class="form-row">
                    <div class="checkbox-mock"></div>
                    <div style="flex: 1;">
                        <div class="pill-line" style="width: 80%; background: var(--text-dark);"></div>
                        <div class="pill-line" style="width: 100%;"></div>
                    </div>
                </div>

                <input type="text" placeholder="Full Name">
                <input type="tel" placeholder="Phone Number">
                
            </div>
            
            <!-- Overlapping Dark Widget -->
            <div class="checkout-widget">
                <div class="widget-box">₵18.50</div>
                <div class="pill-line" style="background: rgba(255,255,255,0.2); width: 80%; margin: 0 auto 15px;"></div>
                <button class="btn-grad" style="width: 100%; padding: 12px; font-size: 14px;" onclick="processPayment()">Pay</button>
            </div>
        </div>
    </section>

    <!-- SETTINGS PAGE (Bottom Left Image Match) -->
    <section id="settings" class="page">
        <div class="settings-card">
            <!-- Left Dark Column -->
            <div class="set-dark">
                <div class="set-avatar"></div>
                <div class="pill-line pill-orange" style="width: 60%; margin-bottom: 5px;"></div>
                <div class="pill-line pill-orange" style="width: 40%; margin-bottom: 20px;"></div>
                
                <div class="pill-line" style="width: 100%; background: rgba(255,255,255,0.1); margin-top: 20px;"></div>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <div class="dash-pill" style="width: 20px;"></div>
                    <div class="dash-pill" style="width: 40px;"></div>
                </div>
                
                <div class="set-avatar" style="height: 60px; border-radius: 10px; margin-top: auto; background: rgba(255,255,255,0.05);"></div>
                <div class="dash-pill" style="width: 30px; margin-top: 10px;"></div>
            </div>
            
            <!-- Right White Column -->
            <div class="set-white">
                <div style="display: flex; justify-content: space-between; margin-bottom: 40px;">
                    <div class="pill-line" style="width: 30%; background: var(--text-dark);"></div>
                    <div class="pill-line" style="width: 20%; background: var(--text-dark);"></div>
                </div>

                <h3 style="margin-bottom: 20px;">Profile Details</h3>
                
                <div class="list-item">
                    <div class="list-icon" style="background: var(--text-muted); opacity: 0.5;"></div>
                    <div style="flex: 1;">
                        <div class="pill-line" style="width: 60%; background: var(--text-dark);"></div>
                        <div class="pill-line" style="width: 40%;"></div>
                    </div>
                </div>
                <div class="list-item">
                    <div class="list-icon"></div>
                    <div style="flex: 1;">
                        <div class="pill-line" style="width: 70%; background: var(--text-dark);"></div>
                        <div class="pill-line" style="width: 50%;"></div>
                    </div>
                </div>
                <div class="list-item">
                    <div class="list-icon" style="background: var(--text-muted); opacity: 0.5;"></div>
                    <div style="flex: 1;">
                        <div class="pill-line" style="width: 50%; background: var(--text-dark);"></div>
                        <div class="pill-line" style="width: 30%;"></div>
                    </div>
                </div>

                <input type="text" placeholder="Update Name..." style="margin-top: 20px;">
            </div>
        </div>
    </section>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            const navItem = document.getElementById('nav-' + pageId);
            if(navItem) navItem.classList.add('active');

            window.scrollTo(0, 0);
        }

        const bundleData = {
            'MTN': [
                {size: '5GB', price: 10},
                {size: '10GB', price: 18},
            ],
            'TELECEL': [
                {size: '8GB', price: 15},
                {size: '15GB', price: 25}
            ],
            'AT': [
                {size: '10GB', price: 17},
                {size: '25GB', price: 40}
            ]
        };

        function openBundles(network) {
            document.getElementById('selected-network').innerText = network + " Bundles";
            const list = document.getElementById('bundle-list');
            list.innerHTML = '';
            
            bundleData[network].forEach(b => {
                list.innerHTML += `
                    <div class="b-white-card">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                            <div class="pill-line" style="width: 40%; background: var(--text-dark);"></div>
                            <div style="color: #FFB85C; font-weight: bold; display: flex; gap: 5px;">
                                <div style="width: 6px; height: 6px; border-radius: 50%; background: #FFB85C; margin-top: 6px;"></div>
                                <div style="width: 6px; height: 6px; border-radius: 50%; background: #FFB85C; margin-top: 6px;"></div>
                                <div style="width: 6px; height: 6px; border-radius: 50%; background: #FFB85C; margin-top: 6px;"></div>
                            </div>
                        </div>
                        <div class="pill-line" style="width: 80%; margin-bottom: 20px;"></div>
                        
                        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                            <div>
                                <h3 style="font-size: 1.8rem;">${b.size}</h3>
                                <p style="color: var(--text-muted);">₵${b.price.toFixed(2)}</p>
                            </div>
                            <button class="btn-grad" style="padding: 10px 20px; border-radius: 12px;" onclick="showPage('checkout')">Buy</button>
                        </div>
                    </div>
                `;
            });
            showPage('bundles');
        }

        function processPayment() {
            alert("Processing in Paystack Gateway...");
            setTimeout(() => {
                alert("Success! Redirecting to WhatsApp...");
            }, 1500);
        }
    </script>
</body>
</html>
