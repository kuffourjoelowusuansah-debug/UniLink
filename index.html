<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniLink GH | Glassmorphic Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #B8B5D0; /* The soft lavender background */
            --dark-panel: #322F4B;
            --glass-light: rgba(255, 255, 255, 0.85);
            --amber: #FF9F43;
            --accent-purple: #4A466A;
            --text-main: #2A2740;
            --text-muted: #7D7A9B;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background-color: var(--bg);
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #C9C6DE 0%, #B8B5D0 100%);
        }

        /* The Canvas for the composition */
        .canvas {
            position: relative;
            width: 1100px;
            height: 800px;
        }

        /* CIRCUIT LINES (The background nodes) */
        .lines-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        .line {
            position: absolute;
            border: 1.5px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
        }
        .node {
            position: absolute;
            width: 8px; height: 8px;
            background: white;
            border-radius: 50%;
        }

        /* BASE CARD STYLES */
        .card {
            position: absolute;
            background: var(--glass-light);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            z-index: 10;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.4);
            transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-5px); }

        .dark-card {
            background: var(--dark-panel);
            color: white;
            border: none;
        }

        /* SPECIFIC ELEMENT LAYOUTS */
        
        /* 1. TOP LEFT: Small Phone/Menu */
        .card-phone-mini {
            top: 80px; left: 100px;
            width: 130px; height: 260px;
            background: var(--dark-panel);
        }

        /* 2. CENTER: Main Dashboard (The Tablet) */
        .card-main {
            top: 120px; left: 350px;
            width: 320px; height: 530px;
            padding: 0;
            overflow: hidden;
        }
        .main-top {
            background: var(--dark-panel);
            height: 330px;
            padding: 25px;
            position: relative;
        }
        .main-bottom {
            background: white;
            height: 200px;
            display: flex; padding: 15px; gap: 10px;
        }

        /* 3. BOTTOM LEFT: Profile/Settings */
        .card-profile {
            bottom: 80px; left: 100px;
            width: 220px; height: 320px;
            display: flex;
        }

        /* 4. TOP RIGHT: Documentation */
        .card-doc {
            top: 100px; right: 80px;
            width: 250px; height: 280px;
        }

        /* 5. BOTTOM RIGHT: Sub-Stats */
        .card-substats {
            bottom: 120px; right: 100px;
            width: 240px; height: 180px;
            background: var(--accent-purple);
        }

        /* UI ELEMENTS FROM THE IMAGE */
        .amber-bar { height: 6px; background: var(--amber); border-radius: 10px; margin: 8px 0; }
        .grey-bar { height: 6px; background: rgba(0,0,0,0.05); border-radius: 10px; margin: 8px 0; }
        .white-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 8px 0; }
        
        .mock-chart {
            width: 100%; height: 100px;
            margin: 20px 0;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            position: relative;
        }
        .wave {
            fill: none;
            stroke: var(--amber);
            stroke-width: 3;
            stroke-linecap: round;
        }

        .mini-window {
            background: white;
            border-radius: 12px;
            flex: 1;
            padding: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        /* ORANGE CUBES */
        .cube {
            position: absolute;
            width: 22px; height: 22px;
            background: var(--amber);
            border-radius: 6px;
            box-shadow: 0 10px 20px rgba(255, 159, 67, 0.4);
            z-index: 5;
        }
    </style>
</head>
<body>

    <div class="canvas">
        <!-- BACKGROUND CIRCUITRY -->
        <div class="lines-container">
            <div class="line" style="width: 200px; height: 150px; top: 50px; left: 150px; border-bottom: none; border-right: none;"></div>
            <div class="line" style="width: 300px; height: 100px; bottom: 50px; right: 150px; border-top: none; border-left: none;"></div>
            <div class="node" style="top: 45px; left: 150px;"></div>
            <div class="node" style="bottom: 145px; right: 145px;"></div>
        </div>

        <!-- ORANGE DECOR CUBES -->
        <div class="cube" style="top: 130px; left: 245px;"></div>
        <div class="cube" style="bottom: 70px; left: 600px;"></div>
        <div class="cube" style="bottom: 230px; right: 70px;"></div>

        <!-- 1. LEFT MINI PHONE -->
        <div class="card card-phone-mini">
            <div class="white-bar" style="width: 40%;"></div>
            <div class="white-bar" style="width: 80%;"></div>
            <div class="mock-chart" style="height: 40px; border: none; margin: 30px 0;">
                <div class="white-bar" style="width: 100%; opacity: 0.05;"></div>
                <div class="white-bar" style="width: 100%; opacity: 0.05; margin-top: 10px;"></div>
            </div>
            <div class="amber-bar" style="width: 60%; margin-top: auto;"></div>
        </div>

        <!-- 2. MAIN CENTRAL DASHBOARD -->
        <div class="card card-main">
            <div class="main-top">
                <div style="display: flex; justify-content: space-between;">
                    <div class="white-bar" style="width: 30px;"></div>
                    <div class="white-bar" style="width: 60px;"></div>
                </div>
                <h2 style="margin-top: 20px; font-size: 14px; letter-spacing: 1px; opacity: 0.8;">NETWORK USAGE</h2>
                <div class="mock-chart">
                    <svg viewBox="0 0 200 60">
                        <path class="wave" d="M0,40 Q25,10 50,30 T100,20 T150,40 T200,10" />
                        <circle cx="50" cy="30" r="4" fill="white" />
                        <circle cx="100" cy="20" r="6" fill="white" opacity="0.3" />
                    </svg>
                </div>
                <div style="display: flex; gap: 5px; margin-top: 20px;">
                    <div class="white-bar" style="width: 15px; opacity: 1; background: white;"></div>
                    <div class="white-bar" style="width: 15px;"></div>
                    <div class="white-bar" style="width: 15px;"></div>
                    <div class="white-bar" style="width: 15px;"></div>
                </div>
            </div>
            <div class="main-bottom">
                <div class="mini-window">
                    <div class="grey-bar" style="width: 40%;"></div>
                    <div class="grey-bar" style="width: 80%;"></div>
                    <div class="grey-bar" style="width: 60%;"></div>
                    <div class="amber-bar" style="width: 30%; margin-top: 20px;"></div>
                </div>
                <div class="mini-window">
                    <div class="grey-bar" style="width: 30%;"></div>
                    <div class="grey-bar" style="width: 70%;"></div>
                    <div class="grey-bar" style="width: 50%;"></div>
                    <div class="amber-bar" style="width: 40%; margin-top: 20px;"></div>
                </div>
            </div>
        </div>

        <!-- 3. BOTTOM LEFT PROFILE -->
        <div class="card card-profile">
            <div style="width: 80px; background: var(--accent-purple); border-radius: 12px; margin-right: 15px;">
                <div class="white-bar" style="width: 20px; margin: 15px auto;"></div>
            </div>
            <div style="flex: 1;">
                <div class="grey-bar" style="width: 100%;"></div>
                <div class="grey-bar" style="width: 60%;"></div>
                <div class="grey-bar" style="width: 80%; height: 20px; margin-top: 20px;"></div>
                <div class="amber-bar" style="width: 40%; margin-top: 50px;"></div>
            </div>
        </div>

        <!-- 4. TOP RIGHT DOCS -->
        <div class="card card-doc">
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <div style="width: 20px; height: 20px; background: var(--text-muted); border-radius: 4px;"></div>
                <div style="width: 20px; height: 20px; background: var(--text-muted); border-radius: 4px;"></div>
            </div>
            <div class="amber-bar" style="width: 100%;"></div>
            <div class="grey-bar" style="width: 80%;"></div>
            <div class="grey-bar" style="width: 90%;"></div>
            <div class="grey-bar" style="width: 70%;"></div>
            <div class="card dark-card" style="position: relative; width: 60px; height: 60px; top: 10px; left: 140px; padding: 10px;">
                <div class="amber-bar" style="width: 100%;"></div>
            </div>
        </div>

        <!-- 5. BOTTOM RIGHT STATS -->
        <div class="card dark-card card-substats">
            <div class="white-bar" style="width: 30%;"></div>
            <div class="white-bar" style="width: 70%;"></div>
            <div class="mock-chart" style="height: 30px; border-color: rgba(255,255,255,0.1);">
                 <svg viewBox="0 0 200 30">
                    <path d="M0,20 L50,15 L100,22 L150,10 L200,18" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
                </svg>
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <div style="width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--amber);"></div>
                <div class="white-bar" style="width: 40px;"></div>
            </div>
        </div>

    </div>

</body>
</html>
